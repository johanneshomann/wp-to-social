name: Build Release ZIP

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build plugin ZIP
        run: |
          mkdir wp-to-social
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='README.md' \
            . wp-to-social/
          zip -r wp-to-social.zip wp-to-social/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: wp-to-social.zip
          generate_release_notes: true
